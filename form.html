    <form action="">
      <fieldset>
        <legend>로그인</legend>
        <label for="user-id"> ID(6자이상) </label>
        <input
          type="text"
          id="user-id"
          size="10"
          value="sjpark"
          maxlength="20"
        />
        <input type="reset" /> <br />

        <label for="user-pw">PW(6자이상)</label>
        <input type="password" id="user-pw" size="9" />
        <br>

        <input type="submit" value="로그인"
        </fieldset>
          
        </fieldset>

      <fieldset>
        <legend>배송 정보</legend>
        Search : <input type="search" id="search">
        <button id="search">검색</button>
        <br>
        URL : <input type="url" name="" id="url">
         <button id="url">검색</button>
        
        <br>
        Email <input type="email" name="" id="email">
         <button id="email">검색</button>
      </fieldset>
    </form>

<form action="">
  <label for="fname">First name:</label>
  <input type="text" id="fname" name="fname" placeholder="이름을 입력"><br>
  <label for="lname">Last name:</label>
  <input type="text" id="lname" name="lname" placeholder="성을 입력"><br>
  <input type="submit" value="Submit">
  <input type="reset" value="Reset"><br><br>

  <label for="w3review">Review of W3Schools:</label><br>

<textarea id="w3review" name="w3review" rows="4" cols="50">
At w3schools.com you will learn how to make a website. They offer free tutorials in all web development technologies.
</textarea>
</form>

<h1>Radio button</h1>
<form>
  <input type="radio" id="html" name="fav_language" value="HTML">
  <label for="html">HTML</label><br>

  <input type="radio" id="css" name="fav_language" value="CSS">
  <label for="css">CSS</label><br>

  <input type="radio" id="javascript" name="fav_language" value="JavaScript">
  <label for="javascript">JavaScript</label><br>
  <input type="radio" id="python" name="fav_language" value="python" checked>
  <label for="python">Python</label><br>
  <input type="radio" id="C" name="fav_language" value="C">
  <label for="C">C</label><br>
</form>

<h1>Checkbox</h1>
<form>
  <input type="checkbox" id="vehicle1" name="vehicle1" value="Bike" checked>
  <label for="vehicle1"> I have a bike</label><br>
  <input type="checkbox" id="vehicle2" name="vehicle2" value="Car">
  <label for="vehicle2"> I have a car</label><br>
  <input type="checkbox" id="vehicle3" name="vehicle3" value="Boat">
  <label for="vehicle3"> I have a boat</label>
</form>

<h1>Input Type</h1>
<form action="">
  <input type="button" onclick="alert('Hello World!')" value="Click Me!">
  <input type="button" onclick="alert('Hello World!!!')" value="Click Me!!!"><br>
  
  <label for="favcolor">Select your favorite color:</label>
  <input type="color" id="favcolor" name="favcolor"><br>

  <label for="birthday">Birthday:</label>
  <input type="date" id="birthday" name="birthday"><br>

  <label for="bdaymonth">Birthday (month and year):</label>
  <input type="month" id="bdaymonth" name="bdaymonth"><br>

    <label for="appt">Select a time:</label>
  <input type="time" id="appt" name="appt" value="00:00"><br>

  <label for="email">Enter your email:</label>
  <input type="email" id="email" name="email"><br>

  <label for="myfile">Select a file:</label>
  <input type="file" id="myfile" name="myfile"><br>

  <input type="hidden" id="custId" name="custId" value="3487">

  <label for="quantity">Quantity (between 1 and 5):</label>
  <input type="number" id="quantity" name="quantity" min="1" max="5" value="1" disabled><br>

    <label for="vol">Volume (between 0 and 50):</label>
  <input type="range" id="vol" name="vol" min="0" max="50"><br>

  <input type="submit" value="Submit"><br><br>

  <label for="cars">Choose a car:</label>
  <select id="cars" name="cars">
    <option value="volvo">Volvo</option>
    <option value="saab">Saab</option>
    <option value="fiat">Fiat</option>
    <option value="audi">Audi</option>
  </select>
  <input type="submit" value="Submit"><br><br>

  <label for="cars">Choose a car:</label>
  <select id="cars" name="cars" size="4" multiple>
    <option value="volvo">Volvo</option>
    <option value="saab">Saab</option>
    <option value="fiat">Fiat</option>
    <option value="audi">Audi</option>
</select>
</form>
